default: &default
  adapter: postgresql # sqlite3 から変更
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV['DB_HOST'] || 'localhost' %>
  username: <%= ENV['DB_USER'] %>
  password: <%= ENV['DB_PASSWORD'] %>
  port: 5432

development:
  <<: *default
  database: techlog_app_development

test:
  <<: *default
  database: techlog_app_test

production:
  <<: *default
  database: <%= ENV['DB_NAME'] %>
